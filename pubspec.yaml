name: okada_vet_clinic
description: "OKADA Veterinary Clinic Management System - Hệ thống quản lý phòng khám thú y OKADA"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # GetX - State Management, Routing, DI
  get: ^4.6.6
  get_storage: ^2.1.1
  
  # Database - Local SQLite
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.1
  path_provider: ^2.1.5
  
  # Firebase - Cloud sync (optional, can be added later)
  # firebase_core: ^2.24.2
  # cloud_firestore: ^4.14.0
  
  # Connectivity
  # connectivity_plus: ^6.1.4
  
  # UI Components
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  signature: ^5.5.0
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.1.0
  
  # Date/Time
  intl: ^0.20.2
  
  # PDF & Printing
  pdf: ^3.11.3
  printing: ^5.14.2
  
  # Excel Import/Export
  excel: ^4.0.6
  spreadsheet_decoder: ^2.0.1
  
  # Charts
  fl_chart: ^0.70.2
  
  # Responsive
  responsive_framework: ^1.5.1
  flutter_screenutil: ^5.9.3
  
  # Utils
  uuid: ^4.5.3
  collection: ^1.19.1
  
  # Icons
  font_awesome_flutter: ^10.8.0
  file_picker: ^10.3.8
  open_file: ^3.5.11
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  http: ^1.6.0
  web_socket_channel: ^3.0.3  # Real-time sync (pure Dart)
  # flutter_dotenv: ^5.2.1  # REMOVED — using --dart-define instead
  window_manager: ^0.5.1
  flutter_native_splash: ^2.4.4
  image_picker: ^1.2.1
  crypto: ^3.0.7
  google_fonts: ^8.0.2
  flutter_secure_storage: ^10.0.0
  sqlcipher_flutter_libs: ^0.7.0+eol
  sqflite_sqlcipher: ^3.4.0
  # supabase_flutter: ^2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.6.3
  build_runner: ^2.10.5
  msix: ^3.16.13

flutter:
  uses-material-design: true
  
  assets:
    # .env removed — secrets via --dart-define
    - assets/images/
    - assets/icons/
    - assets/fonts/
  
  # fonts:
  #   - family: Roboto
  #     fonts:
  #       - asset: assets/fonts/Roboto-Regular.ttf
  #       - asset: assets/fonts/Roboto-Bold.ttf
  #         weight: 700

msix_config:
  display_name: Okada Vet Clinic
  publisher_display_name: Okada
  identity_name: Okada.VetClinic.App
  msix_version: 1.0.0.0
  logo_path: windows\runner\resources\app_icon.ico
  capabilities: runFullTrust, internetClient, privateNetworkClientServer, localSystemNetwork
